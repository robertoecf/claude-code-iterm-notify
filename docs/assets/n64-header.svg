<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="260" viewBox="0 0 1280 260" role="img" aria-label="agentic-coding-notify N64 retro header">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="4" dy="5" stdDeviation="0" flood-color="#8f8a80" flood-opacity="0.65"/>
    </filter>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#efeee8"/>
      <stop offset="1" stop-color="#d7d3c8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="260" fill="#cfcac0"/>
  <rect x="24" y="24" width="1232" height="212" rx="34" fill="url(#panel)" stroke="#8f8a80" stroke-width="3"/>
  <g transform="translate(74 63)" filter="url(#shadow)">
    <rect x="0" y="0" width="95" height="14" rx="6" fill="#356ce6" stroke="#214ea8" stroke-width="2"/>
    <rect x="0" y="27" width="95" height="14" rx="6" fill="#45a755" stroke="#2b7637" stroke-width="2"/>
    <rect x="0" y="54" width="95" height="14" rx="6" fill="#f5c63b" stroke="#b48a18" stroke-width="2"/>
    <rect x="0" y="81" width="95" height="14" rx="6" fill="#df3f47" stroke="#9d2b31" stroke-width="2"/>
  </g>
  <text x="205" y="88" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="54" font-weight="900" letter-spacing="-2" fill="#24231f" filter="url(#shadow)">agentic-coding-notify</text>
  <text x="208" y="132" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#5d5a52">local notification preferences for agent apps and CLIs</text>
  <g font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="800">
