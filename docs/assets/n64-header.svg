    <text x="208" y="204" fill="#45a755">║  N64-GRAY UI · VOICE · SOUNDS · CODEX APP · CLI TABS ║</text>
    <text x="208" y="230" fill="#df3f47">╚══════════════════════════════════════════════════════╝</text>
  </g>
  <rect x="1078" y="72" width="126" height="70" rx="10" fill="#e7e4dc" stroke="#8f8a80" stroke-width="2"/>
  <text x="1107" y="101" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#5d5a52">STATUS</text>
  <text x="1100" y="130" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="27" font-weight="900" fill="#45a755">READY</text>
